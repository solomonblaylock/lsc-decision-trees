<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSC Imaging, Rights, and Licensing Request Workflow</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #f7f7f5;
  color: #1a1a18;
  padding: 2rem 1rem;
}
h1 {
  font-size: 16px;
  font-weight: 600;
  color: #185FA5;
  margin-bottom: 2px;
}
.subtitle {
  font-size: 11px;
  color: #888780;
  margin-bottom: 1.5rem;
}
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 1.5rem;
  padding: 8px 12px;
  background: #fff;
  border-radius: 6px;
  border: 1px solid #e0dfd8;
  font-size: 11px;
  color: #5F5E5A;
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

svg {
  display: block;
  width: 100%;
  height: auto;
  max-width: 900px;
  margin: 0 auto;
}

/* Node base styles */
.node-start { fill: #f1f0ea; stroke: #b4b2a9; }
.node-question { fill: #e6f1fb; stroke: #378ADD; }
.node-action { fill: #eaf3de; stroke: #639922; }
.node-close { fill: #e1f5ee; stroke: #1D9E75; }
.node-escalate { fill: #faeeda; stroke: #BA7517; }
.node-refer { fill: #eeedfe; stroke: #7F77DD; }
.node-info { fill: #faece7; stroke: #D85A30; }
.node-begin { fill: #e6f1fb; stroke: #185FA5; stroke-width: 2; }

.node-text {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  font-size: 11px;
  fill: #1a1a18;
  text-anchor: middle;
  dominant-baseline: middle;
}
.node-text-small {
  font-size: 10px;
  fill: #444441;
}
.node-label {
  font-size: 9px;
  font-weight: 600;
  fill: #888780;
  text-anchor: middle;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.node-begin-text {
  font-size: 11px;
  font-weight: 600;
  fill: #042C53;
  text-anchor: middle;
  dominant-baseline: middle;
}

.connector {
  stroke: #888780;
  stroke-width: 1.5;
  fill: none;
  marker-end: url(#arrow);
}
.connector-label {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  font-size: 10px;
  fill: #5F5E5A;
  text-anchor: middle;
}
</style>
</head>
<body>

<h1>LSC Imaging, Rights &amp; Licensing Request Workflow</h1>
<div class="subtitle">UCLA Library Special Collections &mdash; Staff reference</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#e6f1fb;border:1px solid #378ADD"></div><span>Decision point</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#e1f5ee;border:1px solid #1D9E75"></div><span>Close ticket</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#faeeda;border:1px solid #BA7517"></div><span>Escalate to PSC / AD</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#eeedfe;border:1px solid #7F77DD"></div><span>Refer out</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#eaf3de;border:1px solid #639922"></div><span>Action / workflow</span></div>
  <div class="legend-item"><div class="legend-dot" style="background:#faece7;border:1px solid #D85A30"></div><span>Inform &amp; close</span></div>
</div>

<svg viewBox="0 0 900 1380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#888780"/>
  </marker>
</defs>

<!-- ═══════════════════════════════════════════════
     START
═══════════════════════════════════════════════ -->
<rect x="250" y="20" width="400" height="54" rx="8" class="node-start"/>
<text class="node-text" x="450" y="40"><tspan x="450" dy="0">Incoming LibAnswers ticket requesting user permission,</tspan></text>
<text class="node-text" x="450" y="56"><tspan x="450" dy="0">licensing support, and/or rights research assistance</tspan></text>

<!-- START → Q1 -->
<line x1="450" y1="74" x2="450" y2="102" class="connector"/>

<!-- ═══════════════════════════════════════════════
     Q1 — Identify item
═══════════════════════════════════════════════ -->
<rect x="230" y="104" width="440" height="56" rx="8" class="node-question"/>
<text class="node-label" x="450" y="118">Step 1</text>
<text class="node-text" x="450" y="134"><tspan x="450" dy="0">Does the ticket include the relevant information needed</tspan></text>
<text class="node-text" x="450" y="148"><tspan x="450" dy="0">to identify the item/asset in question?</tspan></text>

<!-- Q1 → Yes → Q2 -->
<line x1="450" y1="160" x2="450" y2="188" class="connector"/>
<text class="connector-label" x="462" y="178">Yes</text>

<!-- Q1 → No → Clarify macro (left) -->
<line x1="230" y1="132" x2="110" y2="132" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="110" y1="132" x2="110" y2="218" class="connector"/>
<text class="connector-label" x="168" y="125">No</text>

<!-- CLARIFY MACRO (left side) -->
<rect x="20" y="218" width="180" height="68" rx="8" class="node-action"/>
<text class="node-text node-text-small" x="110" y="236">Send macro: clarify your</text>
<text class="node-text node-text-small" x="110" y="250">request, refer to researcher</text>
<text class="node-text node-text-small" x="110" y="264">list, link to FAQ about</text>
<text class="node-text node-text-small" x="110" y="278">permission and licensing</text>

<!-- Clarify → loop back to Q1 (arrow up and right) -->
<path d="M 200 252 Q 228 252 228 132 L 230 132" class="connector" fill="none"/>
<text class="connector-label" x="222" y="198">Patron replies</text>

<!-- ═══════════════════════════════════════════════
     Q2 — LSC item?
═══════════════════════════════════════════════ -->
<rect x="230" y="190" width="440" height="56" rx="8" class="node-question"/>
<text class="node-label" x="450" y="204">Step 2</text>
<text class="node-text" x="450" y="220"><tspan x="450" dy="0">Is this a UCLA Library Special Collections</tspan></text>
<text class="node-text" x="450" y="234"><tspan x="450" dy="0">item/collection?</tspan></text>

<!-- Q2 → Yes → Q3 -->
<line x1="450" y1="246" x2="450" y2="274" class="connector"/>
<text class="connector-label" x="462" y="264">Yes</text>

<!-- Q2 → No → Refer other unit (right) -->
<line x1="670" y1="218" x2="790" y2="218" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="790" y1="218" x2="790" y2="238" class="connector"/>
<text class="connector-label" x="730" y="211">No</text>

<!-- REFER OTHER UNIT (right side) -->
<rect x="700" y="238" width="180" height="68" rx="8" class="node-refer"/>
<text class="node-text node-text-small" x="790" y="256">Macro: MEAP/IDEP,</text>
<text class="node-text node-text-small" x="790" y="270">Other DLP Collection,</text>
<text class="node-text node-text-small" x="790" y="284">other Collection in OAC.</text>
<text class="node-text node-text-small" x="790" y="298">Close ticket.</text>

<!-- ═══════════════════════════════════════════════
     Q3 — What does patron need?
═══════════════════════════════════════════════ -->
<rect x="230" y="276" width="440" height="56" rx="8" class="node-question"/>
<text class="node-label" x="450" y="290">Step 3</text>
<text class="node-text" x="450" y="306"><tspan x="450" dy="0">Does the ticket include the relevant information needed</tspan></text>
<text class="node-text" x="450" y="320"><tspan x="450" dy="0">to identify/make actionable next steps?</tspan></text>

<!-- Q3 → Imaging (left branch) -->
<line x1="310" y1="332" x2="180" y2="332" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="180" y1="332" x2="180" y2="386" class="connector"/>
<text class="connector-label" x="240" y="323">Yes — imaging</text>

<!-- Q3 → Use/Permission (center) -->
<line x1="450" y1="332" x2="450" y2="386" class="connector"/>
<text class="connector-label" x="490" y="360">Yes — use/</text>
<text class="connector-label" x="490" y="372">permission</text>

<!-- Q3 → Rights research (right branch) -->
<line x1="590" y1="332" x2="720" y2="332" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="720" y1="332" x2="720" y2="386" class="connector"/>
<text class="connector-label" x="660" y="323">Yes — rights</text>
<text class="connector-label" x="660" y="333">research</text>

<!-- Q3 → No → Clarify macro (arrow left and up) -->
<line x1="230" y1="304" x2="200" y2="304" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="200" y1="252" x2="200" y2="304" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<path d="M 200 252 L 200 286" class="connector" fill="none"/>
<text class="connector-label" x="212" y="280">No →</text>
<text class="connector-label" x="212" y="290">clarify</text>

<!-- ═══════════════════════════════════════════════
     IMAGING BRANCH (left column, x≈180)
═══════════════════════════════════════════════ -->
<rect x="80" y="388" width="200" height="38" rx="8" class="node-begin"/>
<text class="node-begin-text" x="180" y="407">Begin Workflow:</text>
<text class="node-begin-text" x="180" y="420">Request for imaging services</text>

<!-- Imaging → eDelivery -->
<line x1="130" y1="426" x2="130" y2="454" class="connector"/>
<text class="connector-label" x="90" y="443">Low-res /</text>
<text class="connector-label" x="90" y="453">eDelivery</text>

<!-- Imaging → Production -->
<line x1="230" y1="426" x2="230" y2="454" class="connector"/>
<text class="connector-label" x="265" y="443">High-res /</text>
<text class="connector-label" x="265" y="453">production</text>

<rect x="60" y="456" width="140" height="38" rx="8" class="node-action"/>
<text class="node-text node-text-small" x="130" y="470">Route to eDelivery</text>
<text class="node-text node-text-small" x="130" y="484">workflow</text>

<rect x="160" y="456" width="140" height="38" rx="8" class="node-action"/>
<text class="node-text node-text-small" x="230" y="470">Route to production</text>
<text class="node-text node-text-small" x="230" y="484">imaging workflow</text>

<!-- ═══════════════════════════════════════════════
     USE / PERMISSION BRANCH (center, x≈450)
═══════════════════════════════════════════════ -->
<rect x="310" y="388" width="280" height="38" rx="8" class="node-begin"/>
<text class="node-begin-text" x="450" y="401">Begin Workflow: Request for</text>
<text class="node-begin-text" x="450" y="416">Permission for Use or License</text>

<!-- Begin → collection check -->
<line x1="450" y1="426" x2="450" y2="454" class="connector"/>

<rect x="310" y="456" width="280" height="52" rx="8" class="node-question"/>
<text class="node-text" x="450" y="470">Is the use/licensing request for these collections?</text>
<text class="node-text node-text-small" x="450" y="485">• Barbara Morgan Photographs and Papers (LSC:2278)</text>
<text class="node-text node-text-small" x="450" y="498">• Los Angeles Times Photographic Archive (LSC:1429)</text>

<!-- Collection → LA Times (left) -->
<line x1="350" y1="508" x2="350" y2="536" class="connector"/>
<text class="connector-label" x="310" y="524">LA Times /</text>
<text class="connector-label" x="310" y="534">LA Daily News</text>

<!-- Collection → Morgan (center-left) -->
<line x1="430" y1="508" x2="430" y2="536" class="connector"/>
<text class="connector-label" x="430" y="524">Morgan</text>

<!-- Collection → No → rights determination -->
<line x1="560" y1="482" x2="610" y2="482" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="610" y1="482" x2="610" y2="536" class="connector"/>
<text class="connector-label" x="588" y="474">No</text>

<!-- LA TIMES CLOSE -->
<rect x="290" y="538" width="130" height="58" rx="8" class="node-close"/>
<text class="node-text node-text-small" x="355" y="554">Macro: LA Times (Use).</text>
<text class="node-text node-text-small" x="355" y="567">CC Attribution 4.0.</text>
<text class="node-text node-text-small" x="355" y="580">Free with credit line.</text>
<text class="node-text node-text-small" x="355" y="593">Close ticket.</text>

<!-- MORGAN ACTION -->
<rect x="378" y="538" width="110" height="58" rx="8" class="node-action"/>
<text class="node-text node-text-small" x="433" y="554">Macro: Morgan</text>
<text class="node-text node-text-small" x="433" y="567">(Use). LSC holds</text>
<text class="node-text node-text-small" x="433" y="580">copyright. Informal</text>
<text class="node-text node-text-small" x="433" y="593">email permission.</text>

<!-- RIGHTS DETERMINATION BOX -->
<rect x="548" y="538" width="130" height="52" rx="8" class="node-question"/>
<text class="node-text node-text-small" x="613" y="554">Does UCLA LSC hold</text>
<text class="node-text node-text-small" x="613" y="567">the rights to this asset/</text>
<text class="node-text node-text-small" x="613" y="580">item/collection?</text>

<!-- Rights → Yes -->
<line x1="568" y1="590" x2="548" y2="638" class="connector"/>
<text class="connector-label" x="538" y="616">Yes</text>

<!-- Rights → No -->
<line x1="613" y1="590" x2="613" y2="638" class="connector"/>
<text class="connector-label" x="630" y="616">No</text>

<!-- Rights → Unsure -->
<line x1="658" y1="590" x2="678" y2="638" class="connector"/>
<text class="connector-label" x="686" y="616">Unsure</text>

<!-- UC OWNS -->
<rect x="468" y="640" width="140" height="68" rx="8" class="node-action"/>
<text class="node-text node-text-small" x="538" y="656">Macro: Use request</text>
<text class="node-text node-text-small" x="538" y="669">(UC owns rights).</text>
<text class="node-text node-text-small" x="538" y="682">Informal email</text>
<text class="node-text node-text-small" x="538" y="695">permission. No formal</text>
<text class="node-text node-text-small" x="538" y="708">agreement issued.</text>

<!-- NO COPYRIGHT -->
<rect x="558" y="640" width="130" height="68" rx="8" class="node-info"/>
<text class="node-text node-text-small" x="623" y="656">Macro: UCLA does</text>
<text class="node-text node-text-small" x="623" y="669">not hold rights.</text>
<text class="node-text node-text-small" x="623" y="682">Patron must seek</text>
<text class="node-text node-text-small" x="623" y="695">rights holder or</text>
<text class="node-text node-text-small" x="623" y="708">assess own risk.</text>

<!-- ESCALATE -->
<rect x="640" y="640" width="148" height="68" rx="8" class="node-escalate"/>
<text class="node-text node-text-small" x="714" y="656">Escalate to Public</text>
<text class="node-text node-text-small" x="714" y="669">Services Coordinator</text>
<text class="node-text node-text-small" x="714" y="682">for consultation with</text>
<text class="node-text node-text-small" x="714" y="695">Assistant Director.</text>
<text class="node-text node-text-small" x="714" y="708">Add internal note.</text>

<!-- ═══════════════════════════════════════════════
     RIGHTS RESEARCH BRANCH (right, x≈720)
═══════════════════════════════════════════════ -->
<!-- Note: shares escalate box with rights branch above -->
<!-- We'll place rights research begin below x=760 -->

<!-- Q3 rights research line comes in at x=720 -->
<rect x="630" y="388" width="180" height="38" rx="8" class="node-begin"/>
<text class="node-begin-text" x="720" y="401">Begin Workflow: Request</text>
<text class="node-begin-text" x="720" y="416">for rights research assistance</text>

<!-- Rights research → finding aid check -->
<line x1="720" y1="426" x2="720" y2="454" class="connector"/>

<rect x="630" y="456" width="180" height="52" rx="8" class="node-question"/>
<text class="node-text node-text-small" x="720" y="472">Check "Terms of Access and Use"</text>
<text class="node-text node-text-small" x="720" y="485">or "Conditions Governing Use"</text>
<text class="node-text node-text-small" x="720" y="498">section of the finding aid.</text>

<!-- Finding aid → identifies rights holder -->
<line x1="680" y1="508" x2="660" y2="536" class="connector"/>
<text class="connector-label" x="645" y="522">Identifies</text>
<text class="connector-label" x="645" y="532">rights holder</text>

<!-- Finding aid → silent → escalate -->
<line x1="760" y1="508" x2="780" y2="536" class="connector"/>
<text class="connector-label" x="800" y="520">Silent /</text>
<text class="connector-label" x="800" y="530">incomplete</text>

<!-- REFER RIGHTS HOLDER -->
<rect x="580" y="538" width="148" height="68" rx="8" class="node-refer"/>
<text class="node-text node-text-small" x="654" y="554">Share rights holder</text>
<text class="node-text node-text-small" x="654" y="567">info from finding aid.</text>
<text class="node-text node-text-small" x="654" y="580">Advise patron to</text>
<text class="node-text node-text-small" x="654" y="593">contact directly.</text>
<text class="node-text node-text-small" x="654" y="606">Close ticket.</text>

<!-- Silent → Escalate (reuse same escalate box, draw line down-right) -->
<line x1="790" y1="536" x2="790" y2="610" class="connector" marker-end="none" stroke="#888780" stroke-width="1.5"/>
<line x1="790" y1="610" x2="714" y2="638" class="connector"/>

</svg>

</body>
</html>
